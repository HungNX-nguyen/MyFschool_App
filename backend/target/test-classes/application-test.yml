spring:
  datasource:
    url: jdbc:h2:mem:myfschool-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

app:
  jwt:
    secret: test-only-myfschool-jwt-secret-with-at-least-thirty-two-characters
    access-token-expiration-seconds: 3600
    refresh-token-expiration-seconds: 604800
