server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: myfschool-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/myfschool?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: root
    password: hunghet1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-myfschool-jwt-secret-change-before-production-2026}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}
